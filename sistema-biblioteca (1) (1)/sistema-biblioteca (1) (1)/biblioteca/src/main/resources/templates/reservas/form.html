<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nova Reserva — Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a th:href="@{/}" class="nav-brand"><svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg><span class="brand-text">BiblioSystem</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/livros}">Livros</a></li>
        <li><a th:href="@{/usuarios}">Usuários</a></li>
        <li><a th:href="@{/emprestimos}">Empréstimos</a></li>
        <li><a th:href="@{/reservas}" class="active">Reservas</a></li>
    </ul>
</nav>
<main class="main-content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Nova Reserva</h1>
            <p class="page-subtitle">Reserva válida por 7 dias</p>
        </div>
        <a th:href="@{/reservas}" class="btn btn-ghost">← Voltar</a>
    </div>

    <div class="form-card">
        <form th:action="@{/reservas/reservar}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="usuarioId">Usuário *</label>
                    <select id="usuarioId" name="usuarioId" class="form-control" required>
                        <option value="">Selecione o usuário...</option>
                        <option th:each="u : ${usuarios}" th:value="${u.id}"
                                th:text="${u.nome + ' (' + u.matricula + ')'}">-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="livroId">Livro *</label>
                    <select id="livroId" name="livroId" class="form-control" required>
                        <option value="">Selecione o livro...</option>
                        <option th:each="l : ${livros}" th:value="${l.id}"
                                th:text="${l.titulo + ' — ' + l.autor}">-</option>
                    </select>
                </div>
            </div>
            <div class="info-box">
                <p><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg> A reserva ficará ativa por <strong>7 dias</strong>. Após esse prazo, será automaticamente expirada.</p>
            </div>
            <div class="form-actions">
                <a th:href="@{/reservas}" class="btn btn-ghost">Cancelar</a>
                <button type="submit" class="btn btn-primary">Confirmar Reserva</button>
            </div>
        </form>
    </div>
</main>
<footer class="footer"><p>Sistema de Controle de Biblioteca &copy; 2024</p></footer>
</body>
</html>
