<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title != null ? title + ' — Biblioteca' : 'Sistema de Biblioteca'}">Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="nav-brand">
        <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        <span class="brand-text">Biblioteca</span>
    </a>
    <ul class="nav-links">
        <li><a th:href="@{/livros}" th:classappend="${#request.requestURI.contains('/livros')} ? 'active'">Livros</a></li>
        <li><a th:href="@{/usuarios}" th:classappend="${#request.requestURI.contains('/usuarios')} ? 'active'">Usuários</a></li>
        <li><a th:href="@{/emprestimos}" th:classappend="${#request.requestURI.contains('/emprestimos')} ? 'active'">Empréstimos</a></li>
        <li><a th:href="@{/reservas}" th:classappend="${#request.requestURI.contains('/reservas')} ? 'active'">Reservas</a></li>
    </ul>
</nav>

<main class="main-content">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-error" th:text="${erro}"></div>
    <th:block th:fragment="content"></th:block>
</main>

<footer class="footer">
    <p>Sistema de Controle de Biblioteca &copy; 2026</p>
</footer>

</body>
</html>
